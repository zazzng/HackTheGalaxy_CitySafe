<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BC Heat Map - ICBC Crash Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><i class="fas fa-map"></i> BC Heat Map</h1>
        <p>Interactive Analysis of ICBC Crash Data in British Columbia</p>
    </header>

    <div class="main-container">
        <!-- Map Section -->
        <div class="section map-container">
            <div class="section-title">
                <i class="fas fa-layer-group"></i> Crash Density Heatmap
            </div>
            <div class="section-content">
                <iframe src="heatmap.html" class="map-iframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
            </div>
        </div>

        <!-- Top Cities Section -->
        <div class="section top-zones-container">
            <div class="section-title">
                <i class="fas fa-building"></i> Top Crash Cities
            </div>
            <div class="section-content">
                <div id="topZonesContent" class="zones-grid"></div>
            </div>
        </div>
    </div>

    <footer>
        <p><strong>BC Heat Map</strong> - ICBC Crash Data Analysis</p>
        <p>Data Source: Insurance Corporation of British Columbia (ICBC)</p>
        <p><a href="driver-warning.html" style="color: #ffc107; text-decoration: none;"><i class="fas fa-shield-alt"></i> Use Driver Safety Warning</a></p>
        <p>&copy; 2026 HackTheGalaxy - CitySafe Project</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
